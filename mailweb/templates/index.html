<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页邮件发送系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="card-header">
        <p class="badge">Mail Form Demo</p>
        <h1>网页邮件发送系统</h1>
      </div>

      <form id="mail-form" class="mail-form" novalidate>
        <div class="form-row">
          <label for="name">提交人姓名</label>
          <input id="name" name="name" type="text" maxlength="100" placeholder="例如：张三" required>
        </div>

        <div class="form-row">
          <label for="email">联系邮箱</label>
          <input id="email" name="email" type="email" placeholder="sender@example.com" required>
        </div>

        <div class="form-row">
          <label for="to_email">收件人邮箱</label>
          <input id="to_email" name="to_email" type="email" placeholder="receiver@example.com" required>
        </div>

        <div class="form-row">
          <label for="subject">邮件主题</label>
          <input id="subject" name="subject" type="text" maxlength="200" placeholder="请输入清晰直接的事务性主题" required>
        </div>

        <div class="form-row">
          <label for="message">邮件正文</label>
          <textarea id="message" name="message" rows="8" maxlength="5000" placeholder="请输入事务性邮件正文内容。" required></textarea>
        </div>

        <button id="submit-btn" type="submit">提交并发送邮件</button>
      </form>

      <div id="result" class="result" role="status" aria-live="polite"></div>

      <footer class="footer-note">
        本页面通过 Nginx + Flask + SMTP 实现邮件发送。
      </footer>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
