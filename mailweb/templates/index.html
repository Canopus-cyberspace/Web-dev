<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作业邮件提交系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="card-header">
        <p class="badge">Assignment Mail Demo</p>
        <h1>作业邮件提交系统</h1>
        <p class="subtitle">通过网页表单向老师提交作业邮件，适合 Ubuntu 22.04 + Nginx + Flask 的公网部署场景。</p>
      </div>

      <div class="target-box">
        <span class="target-label">提交目标</span>
        <strong>{{ teacher_email }}</strong>
        <p>老师邮箱由服务器端固定配置，公网环境下不会让访问者自行指定收件人。</p>
      </div>

      <form id="mail-form" class="mail-form" novalidate>
        <div class="form-row">
          <label for="name">发件人姓名</label>
          <input id="name" name="name" type="text" maxlength="100" placeholder="例如：张三" required>
        </div>

        <div class="form-row">
          <label for="email">发件人邮箱</label>
          <input id="email" name="email" type="email" placeholder="student@example.com" required>
        </div>

        <div class="form-row">
          <label for="subject">邮件主题</label>
          <input id="subject" name="subject" type="text" maxlength="200" placeholder="课程作业提交 - 第 1 次实验" required>
        </div>

        <div class="form-row">
          <label for="message">邮件正文</label>
          <textarea id="message" name="message" rows="8" maxlength="5000" placeholder="请输入作业说明、附件说明或备注信息。" required></textarea>
        </div>

        <button id="submit-btn" type="submit">提交并发送邮件</button>
      </form>

      <div id="result" class="result" role="status" aria-live="polite"></div>

      <footer class="footer-note">
        本页面通过 Nginx + Flask + SMTP 实现邮件发送。
      </footer>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
