<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页邮件发送系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="card-header">
        <p class="badge">Mail Form Demo</p>
        <h1>网页邮件发送系统</h1>
        <p class="subtitle">通过网页表单填写发件人、收件人、主题与正文，由 Ubuntu 服务器通过 Nginx + Flask + SMTP 发出邮件。</p>
      </div>

      <div class="target-box">
        <span class="target-label">使用说明</span>
        <strong>收件人邮箱由提交者自行填写</strong>
        <p>如果你要把这个站点暴露到公网，强烈建议额外增加登录、验证码或收件人白名单，避免被滥用为任意发信入口。</p>
      </div>

      <form id="mail-form" class="mail-form" novalidate>
        <div class="form-row">
          <label for="name">发件人姓名</label>
          <input id="name" name="name" type="text" maxlength="100" placeholder="例如：张三" required>
        </div>

        <div class="form-row">
          <label for="email">发件人邮箱</label>
          <input id="email" name="email" type="email" placeholder="sender@example.com" required>
        </div>

        <div class="form-row">
          <label for="to_email">收件人邮箱</label>
          <input id="to_email" name="to_email" type="email" placeholder="receiver@example.com" required>
        </div>

        <div class="form-row">
          <label for="subject">邮件主题</label>
          <input id="subject" name="subject" type="text" maxlength="200" placeholder="请输入邮件主题" required>
        </div>

        <div class="form-row">
          <label for="message">邮件正文</label>
          <textarea id="message" name="message" rows="8" maxlength="5000" placeholder="请输入邮件正文内容。" required></textarea>
        </div>

        <button id="submit-btn" type="submit">提交并发送邮件</button>
      </form>

      <div id="result" class="result" role="status" aria-live="polite"></div>

      <footer class="footer-note">
        本页面通过 Nginx + Flask + SMTP 实现邮件发送。
      </footer>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
