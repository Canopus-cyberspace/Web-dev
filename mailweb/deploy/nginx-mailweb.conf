# 该指令位于 http 上下文中，sites-enabled 下的文件可以直接使用。
limit_req_zone $binary_remote_addr zone=mailweb_form:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name submit.example.com;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location = /send {
        limit_req zone=mailweb_form burst=10 nodelay;

        proxy_pass http://127.0.0.1:5000/send;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
